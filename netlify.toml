[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  
[context]
  # Prevent Netlify from auto-detecting an SSR framework output directory
  # which can set the publish directory to `dist/client`.
  # This file ensures the static Vite build output (`dist`) is used.